version: '3.9'

services:
  app:
    build: .
    ports:
      - '8000:8000'
    env_file:
      - ./backend/.env
    volumes:
      - /tmp/ats_optimizer:/tmp/ats_optimizer
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
